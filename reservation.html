<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Daily Grind | Book a Table</title>
</head>
<body>
    <header>
        <div class="logo">Daily Grind</div>
        <nav><ul><li><a href="index.html">Home</a></li></ul></nav>
    </header>
    <main class="form-container">
        <h2>Book a Table</h2>
        <form class="reservation-form">
            <input type="text" id="name" placeholder="Name" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <input type="number" id="guests" placeholder="Guests" required>
            <button type="submit" class="cta-button">Confirm Booking</button>
        </form>
    </main>
    <script>
        document.querySelector('.reservation-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const newRes = {
                name: document.getElementById('name').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                guests: document.getElementById('guests').value
            };
            const res = JSON.parse(localStorage.getItem('cafeReservations') || '[]');
            res.push(newRes);
            localStorage.setItem('cafeReservations', JSON.stringify(res));
            alert("Reservation confirmed!");
            this.reset();
        });
    </script>
</body>
</html>
